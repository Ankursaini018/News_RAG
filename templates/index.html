<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>News RAG Assistant</title>

    <link rel="stylesheet" href="/static/css/style.css">

</head>

<body>

    <div class="container">

        <div class="header">

            <h1>📰 News RAG Assistant</h1>

            <p>Ask questions about the latest BBC News.</p>

        </div>

        <div class="card">

            <textarea
                id="question"
                placeholder="Ask anything about today's news..."
            ></textarea>

            <button id="askBtn">
                🚀 Ask AI
            </button>

        </div>

        <!-- Loading -->
        <div id="loading" class="hidden">

            <div class="spinner"></div>

            <p>Thinking...</p>

        </div>

        <!-- Answer -->
        <div id="chat-history">

        </div>

            <h2>🤖 Answer</h2>

            <div id="answer"></div>

        </div>

        <!-- Sources -->
        <div id="sources-card">

            <h2>📚 Sources</h2>

            <div id="sources"></div>

        </div>

    </div>

    <script src="/static/js/app.js"></script>

</body>

</html>
